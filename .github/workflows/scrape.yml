name: 每天自動擷取新聞
on:
  schedule:
    - cron: '0 * * * *' # 每小時自動執行一次
  workflow_dispatch: # 也可以手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查代碼
        uses: actions/checkout@v2
      - name: 設定 Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: 安裝套件
        run: pip install requests beautifulsoup4
      - name: 執行抓取
        run: python scraper.py
      - name: 提交並推送更新後的 data.json
        run: |
          git config --global user.name "AutoScraper"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "自動更新新聞內容" || exit 0
          git push
