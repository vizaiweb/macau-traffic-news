<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DSAT 交通廣播系統 - 實戰版</title>
    <style>
        :root {
            --bg-color: #050505;
            --dsat-red: #e63946;
            --text-gold: #ffca28;
            --page-info: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0; background: var(--bg-color); color: white;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 標題欄 */
        .header {
            background: var(--dsat-red); padding: 2vh; font-size: 4.2vh;
            font-weight: 900; text-align: center; position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        /* 左側日期：同步截圖內容 */
        .publish-date {
            position: absolute; left: 20px; font-size: 2.8vh;
            color: rgba(255, 255, 255, 0.9); font-weight: normal;
        }

        .controls {
            position: absolute; right: 20px; display: flex; gap: 10px;
        }

        .btn {
            background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff;
            padding: 8px 18px; cursor: pointer; border-radius: 4px; font-size: 1.1rem;
        }

        /* 內容區 */
        .main-display { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            padding: 0 7vw; position: relative; 
        }

        #ui-content { 
            font-size: 5.2vh; line-height: 1.7; color: #fff; text-align: justify; width: 100%;
        }

        .page-counter {
            position: absolute; bottom: 3vh; right: 4vw;
            font-size: 3.2vh; color: var(--page-info);
        }

        /* 底部走字 */
        .marquee-wrapper {
            background: #111; height: 12vh; border-top: 4px solid var(--text-gold);
            display: flex; align-items: center; overflow: hidden; position: relative;
        }
        #marquee-text { white-space: nowrap; font-size: 5.5vh; font-weight: bold; color: var(--text-gold); position: absolute; }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn" style="font-size: 2rem; padding: 20px 40px;" onclick="initSystem()">啟動廣播系統</button>
    </div>

    <div class="header">
        <div id="ui-date" class="publish-date">--/--/----</div>
        <span id="ui-title">載入中...</span>
        <div class="controls">
            <button class="btn" onclick="resumeApp()">▶ 播放</button>
            <button class="btn" onclick="pauseApp()">⏸ 暫停</button>
            <button class="btn" onclick="stopApp()">⏹ 停止</button>
        </div>
    </div>

    <div class="main-display">
        <div id="ui-content">等待播放...</div>
        <div id="ui-page" class="page-counter"></div>
    </div>

    <div class="marquee-wrapper">
        <div id="marquee-text"></div>
    </div>

    <script>
        const news = {
            date: "28-04-2026", // 依據截圖更新
            title: "跨部門提前協調部署五一交通安排",
            // 內文從日期開始，確保一字不漏
            fullText: "日期：28-04-2026。為保障五一勞動節假期期間市民和旅客出行暢順，並平衡遊客與居民的出行需求，交通事務局按照恆常跨部門協作機制，聯同治安警察局、海關、市政署、巴士公司、跨境客運、綜合度假休閒企業及酒店（下簡稱“休企＂）、關閘東側站場管理公司等舉行協調會議，透過協調公共巴士及輕軌服務、完善口岸交通配套、強化實時訊息發佈、制訂應急預案等，以有效疏導假期人流。",
            highlights: "【重點內容】五一期間增開 3BX, 17T, 21AT, 26AT, 101XS 巴士線；輕軌延長服務；舊城區實施臨時行人專用區。"
        };

        const synth = window.speechSynthesis;
        let isStopped = true;
        let marqueePos = window.innerWidth;
        let currentIter = 0;

        function splitText(text, size = 80) {
            const arr = [];
            for (let i = 0; i < text.length; i += size) arr.push(text.substring(i, i + size));
            return arr;
        }
        const pages = splitText(news.fullText);

        function initSystem() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui-title').innerText = news.title;
            document.getElementById('ui-date').innerText = news.date;
            document.getElementById('marquee-text').innerText = news.highlights;
            startMarquee();
            resumeApp();
        }

        async function playSequence(iterId) {
            if (isStopped || iterId !== currentIter) return;
            const contentEl = document.getElementById('ui-content');
            const pageEl = document.getElementById('ui-page');

            for (let i = 0; i < pages.length; i++) {
                if (isStopped || iterId !== currentIter) break;
                pageEl.innerText = `${i + 1} / ${pages.length}`;
                contentEl.innerText = pages[i];
                await speak(pages[i]);
                if (!isStopped) await new Promise(r => setTimeout(r, 800));
            }
            if (!isStopped && iterId === currentIter) playSequence(iterId);
        }

        function speak(text) {
            return new Promise((resolve) => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-HK';
                utter.rate = 0.92; // 調整語速
                utter.onend = resolve;
                utter.onerror = resolve;
                synth.speak(utter);
            });
        }

        function resumeApp() {
            if (synth.paused) {
                synth.resume();
            } else if (isStopped) {
                synth.cancel();
                isStopped = false;
                currentIter++;
                playSequence(currentIter);
            }
        }

        function pauseApp() { synth.pause(); }

        function stopApp() {
            isStopped = true;
            synth.cancel();
            document.getElementById('ui-content').innerText = "播放已停止";
            document.getElementById('ui-page').innerText = "";
        }

        function startMarquee() {
            const marquee = document.getElementById('marquee-text');
            function animate() {
                if (!isStopped && !synth.paused) {
                    marqueePos -= 2.2;
                    if (marqueePos < -marquee.offsetWidth) marqueePos = window.innerWidth;
                    marquee.style.transform = `translateX(${marqueePos}px)`;
                }
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
