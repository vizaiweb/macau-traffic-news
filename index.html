<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DSAT 交通資訊自動廣播屏</title>
    <style>
        :root {
            --bg-color: #050505;
            --dsat-red: #e63946;
            --text-gold: #ffca28;
            --page-info: rgba(255, 255, 255, 0.3);
        }

        /* 核心修復：強制禁止全身滾動 */
        body {
            margin: 0; background: var(--bg-color); color: white;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            overflow: hidden; 
        }

        /* 標題區：固定高度 */
        .header {
            height: 12vh; min-height: 80px;
            background: var(--dsat-red); 
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .publish-date {
            position: absolute; left: 30px; font-size: 2.5vh;
            color: rgba(255, 255, 255, 0.9); font-weight: normal;
        }

        #ui-title {
            font-size: 4.5vh; font-weight: 900;
            max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .controls { position: absolute; right: 20px; display: flex; gap: 10px; }
        .btn { background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff; padding: 8px 15px; cursor: pointer; border-radius: 6px; font-size: 1rem; }

        /* 內文區：自動伸縮，絕不超出 */
        .main-display { 
            flex: 1; /* 佔據剩餘所有空間 */
            display: flex; justify-content: center; align-items: center; 
            padding: 0 6vw; position: relative;
            overflow: hidden; /* 確保內容不會溢出蓋到走字 */
        }

        /* 內文字體放大 20% (約 6.5vh) */
        #ui-content { 
            font-size: 6.5vh; line-height: 1.5; color: #fff; text-align: justify; 
            width: 100%; transition: opacity 0.3s; font-weight: 500;
            word-wrap: break-word;
        }

        .page-counter {
            position: absolute; bottom: 2vh; right: 3vw;
            font-size: 3vh; color: var(--page-info);
        }

        /* 底部走字區：固定高度 */
        .marquee-wrapper {
            height: 12vh; min-height: 70px;
            background: #111; border-top: 5px solid var(--text-gold);
            display: flex; align-items: center; overflow: hidden; position: relative;
            z-index: 10;
        }
        #marquee-text { 
            white-space: nowrap; font-size: 6vh; font-weight: bold; 
            color: var(--text-gold); position: absolute; 
        }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn" style="font-size: 2.5rem; padding: 30px 70px;" onclick="initSystem()">啟動系統</button>
    </div>

    <header class="header">
        <div id="ui-date" class="publish-date">--/--/----</div>
        <div id="ui-title">同步中...</div>
        <div class="controls">
            <button class="btn" onclick="resumeApp()">播放</button>
            <button class="btn" onclick="pauseApp()">暫停</button>
            <button class="btn" onclick="stopApp()">停止</button>
        </div>
    </header>

    <main class="main-display">
        <div id="ui-content">正在獲取資料...</div>
        <div id="ui-page" class="page-counter"></div>
    </main>

    <footer class="marquee-wrapper">
        <div id="marquee-text">正在載入最新交通資訊...</div>
    </footer>

    <script>
        let isStopped = true;
        let currentIter = 0;
        let pages = [];
        let marqueePos = window.innerWidth;
        const synth = window.speechSynthesis;

        // 智慧分頁：這是在放大字體後防止溢出的關鍵
        function smartSplit(text, maxLength = 65) {
            const result = [];
            let currentStr = "";
            // 以標點符號切分
            const chunks = text.split(/([。；！？])/).filter(Boolean);

            for (let i = 0; i < chunks.length; i++) {
                let s = chunks[i];
                // 如果加上這一句會超過長度限制，就另起一頁
                if ((currentStr + s).length > maxLength && currentStr !== "") {
                    result.push(currentStr);
                    currentStr = "";
                }
                currentStr += s;
            }
            if (currentStr) result.push(currentStr);
            return result;
        }

        async function updateNewsData() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                
                document.getElementById('ui-title').innerText = data.title;
                document.getElementById('ui-date').innerText = data.date;
                document.getElementById('marquee-text').innerText = "【最新交通消息】" + data.title;
                
                // 執行分頁
                pages = smartSplit(data.fullText);
                
                if (!isStopped) startBroadcast();
            } catch (e) {
                console.error("等待數據中...");
            }
        }

        function initSystem() {
            document.getElementById('overlay').style.display = 'none';
            isStopped = false;
            updateNewsData();
            startMarquee();
            setInterval(updateNewsData, 600000);
        }

        async function startBroadcast() {
            currentIter++;
            const iterId = currentIter;
            const contentEl = document.getElementById('ui-content');
            const pageEl = document.getElementById('ui-page');

            for (let i = 0; i < pages.length; i++) {
                if (isStopped || iterId !== currentIter) break;
                
                contentEl.style.opacity = "0";
                await new Promise(r => setTimeout(r, 300));
                
                pageEl.innerText = `${i + 1} / ${pages.length}`;
                contentEl.innerText = pages[i];
                contentEl.style.opacity = "1";
                
                await speak(pages[i]);
                if (!isStopped) await new Promise(r => setTimeout(r, 1000));
            }
            if (!isStopped && iterId === currentIter) startBroadcast();
        }

        function speak(text) {
            return new Promise((resolve) => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-HK';
                utter.rate = 0.9;
                utter.onend = resolve;
                utter.onerror = resolve;
                synth.speak(utter);
            });
        }

        function stopApp() {
            isStopped = true;
            synth.cancel();
            document.getElementById('ui-content').innerText = "系統已停機";
            document.getElementById('ui-page').innerText = "";
        }

        function resumeApp() {
            if (isStopped) {
                isStopped = false;
                startBroadcast();
            } else {
                synth.resume();
            }
        }

        function pauseApp() { synth.pause(); }

        function startMarquee() {
            const marquee = document.getElementById('marquee-text');
            function animate() {
                if (!isStopped && !synth.paused) {
                    marqueePos -= 2.2; 
                    if (marqueePos < -marquee.offsetWidth) marqueePos = window.innerWidth;
                    marquee.style.transform = `translateX(${marqueePos}px)`;
                }
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
