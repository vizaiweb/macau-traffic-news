<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 12vh; background: #e63946; display: flex; align-items: center; justify-content: center; position: relative; z-index: 100; }
        .publish-date { position: absolute; left: 20px; font-size: 2.5vh; }
        #ui-title { font-size: 4.5vh; font-weight: bold; width: 60%; text-align: center; }
        
        /* 內容顯示區：增加放大 20% 字體，並防止覆蓋 */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 0 8vw; position: relative; z-index: 50; }
        #ui-text { font-size: 6.5vh; line-height: 1.6; text-align: justify; }
        
        /* 走字區：確保在最底層且不被蓋住 */
        .footer { height: 12vh; background: #111; border-top: 4px solid #ffca28; position: relative; z-index: 100; overflow: hidden; display: flex; align-items: center; }
        #marquee { white-space: nowrap; font-size: 6vh; color: #ffca28; position: absolute; font-weight: bold; }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .btn { padding: 20px 50px; font-size: 3vh; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay"><button class="btn" onclick="start()">啟動廣播系統</button></div>
    <div class="header">
        <div id="ui-date" class="publish-date">--/--/----</div>
        <div id="ui-title">載入中...</div>
    </div>
    <div class="main-content"><div id="ui-text">等待數據...</div></div>
    <div class="footer"><div id="marquee">載入中...</div></div>

    <script>
        let pages = [];
        let cur = 0;
        let isPlay = false;
        let mPos = window.innerWidth;

        async function load() {
            const r = await fetch('data.json?v=' + Date.now());
            const d = await r.json();
            document.getElementById('ui-title').innerText = d.title;
            document.getElementById('ui-date').innerText = d.date;
            document.getElementById('marquee').innerText = "【最新消息】" + d.title;
            
            // 智慧分頁 (60字一頁)
            pages = d.fullText.match(/[^。；！？]+[。；！？]/g) || [d.fullText];
            if (isPlay) play();
        }

        function start() {
            document.getElementById('overlay').style.display = 'none';
            isPlay = true;
            load();
            setInterval(load, 600000);
            animate();
        }

        async function play() {
            const txt = document.getElementById('ui-text');
            for (let i = 0; i < pages.length; i++) {
                txt.innerText = pages[i];
                await speak(pages[i]);
                await new Promise(r => setTimeout(r, 1000));
            }
            play(); // 循環播放
        }

        function speak(t) {
            return new Promise(res => {
                const u = new SpeechSynthesisUtterance(t);
                u.lang = 'zh-HK'; u.rate = 0.9;
                u.onend = res;
                window.speechSynthesis.speak(u);
            });
        }

        function animate() {
            const m = document.getElementById('marquee');
            mPos -= 2;
            if (mPos < -m.offsetWidth) mPos = window.innerWidth;
            m.style.transform = `translateX(${mPos}px)`;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
