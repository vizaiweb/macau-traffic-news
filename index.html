<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DSAT 交通消息實時廣播 - 分頁強化版</title>
    <style>
        :root {
            --bg-color: #050505;
            --dsat-red: #e63946;
            --text-gold: #ffca28;
        }

        body {
            margin: 0; background: var(--bg-color); color: white;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header {
            background: var(--dsat-red); padding: 2vh; font-size: 4vh;
            font-weight: 900; text-align: center;
        }

        /* 中間全文顯示區：分頁邏輯 */
        .main-display {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 0 8vw; position: relative;
        }

        #ui-content {
            font-size: 4.5vh; line-height: 1.8; color: #fff;
            text-align: justify; transition: opacity 0.5s;
        }

        /* 下方走字區域：顯示重點 */
        .marquee-wrapper {
            background: #1a1a1a; height: 12vh; border-top: 4px solid var(--text-gold);
            display: flex; align-items: center; overflow: hidden; position: relative;
        }

        #marquee-text {
            white-space: nowrap; font-size: 5.5vh; font-weight: bold;
            color: var(--text-gold); position: absolute;
        }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .page-indicator {
            position: absolute; bottom: 20px; right: 20px;
            font-size: 2.5vh; color: #666;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="startApp()" style="padding:20px 50px; font-size:30px; cursor:pointer;">啟動五一交通消息播放</button>
    </div>

    <div class="header" id="ui-title">載入中...</div>

    <div class="main-display">
        <div id="ui-content"></div>
        <div id="page-num" class="page-indicator"></div>
    </div>

    <div class="marquee-wrapper">
        <div id="marquee-text"></div>
    </div>

    <script>
        const newsData = {
            id: "20260429-01",
            title: "跨部門協調五一交通安排",
            fullText: "為保障五一勞動節假期期間市民和旅客出行暢順，並平衡遊客與居民的出行需求，交通事務局按照恆常跨部門協作機制，聯同治安警察局、海關、市政署、巴士公司、跨境客運、綜合度假休閒企業及酒店等舉行協調會議。透過協調公共巴士及輕軌服務、完善口岸交通配套、強化實時訊息發佈、制訂應急預案等，以有效疏導假期人流。主要措施包括：各口岸預留穿梭巴士停靠區；兩巴營運時節性路線 3BX、17T、21AT、26AT 及 101XS；輕軌於指定日子延長服務至凌晨；及在舊城區設置臨時行人專用區等。",
            highlights: "【重點內容】五一期間增開 3BX, 17T, 21AT, 26AT, 101XS 巴士路線；輕軌延長服務；舊城區實施臨時行人專用區；口岸穿梭巴士改為點對點直達。"
        };

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            playSequence();
        }

        // 將長文本分段（約每 80-100 字一頁）
        function splitText(text, length = 90) {
            const pages = [];
            for (let i = 0; i < text.length; i += length) {
                pages.push(text.substring(i, i + length));
            }
            return pages;
        }

        async function playSequence() {
            const titleEl = document.getElementById('ui-title');
            const contentEl = document.getElementById('ui-content');
            const marqueeEl = document.getElementById('marquee-text');
            const pageEl = document.getElementById('page-num');

            titleEl.innerText = newsData.title;
            marqueeEl.innerText = newsData.highlights;
            
            const pages = splitText(newsData.fullText);
            
            // 啟動下方走字動畫
            startMarquee();

            // 循環播放每一頁
            for (let i = 0; i < pages.length; i++) {
                contentEl.style.opacity = 0;
                await new Promise(r => setTimeout(r, 500));
                
                contentEl.innerText = pages[i];
                pageEl.innerText = `第 ${i+1} / ${pages.length} 頁`;
                contentEl.style.opacity = 1;

                // 播放該頁語音並等待結束
                await speakText(pages[i]);
                await new Promise(r => setTimeout(r, 1000)); // 頁面間隔
            }

            // 全部播完後延遲重播
            setTimeout(playSequence, 5000);
        }

        function speakText(text) {
            return new Promise((resolve) => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-HK';
                utter.rate = 0.9;
                utter.onend = resolve;
                window.speechSynthesis.speak(utter);
            });
        }

        function startMarquee() {
            const marquee = document.getElementById('marquee-text');
            const speed = 100; // 像素每秒
            const textWidth = marquee.offsetWidth;
            const containerWidth = window.innerWidth;
            
            let pos = containerWidth;
            
            function animate() {
                pos -= 1.5; // 移動速度
                if (pos < -marquee.offsetWidth) {
                    pos = containerWidth;
                }
                marquee.style.transform = `translateX(${pos}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
