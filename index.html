<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DSAT 交通廣播 - 增強視覺版</title>
    <style>
        :root {
            --bg-color: #050505;
            --dsat-red: #e63946;
            --text-gold: #ffca28;
            --page-info: rgba(255, 255, 255, 0.3); /* 淺色分頁文字 */
        }

        body {
            margin: 0; background: var(--bg-color); color: white;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 標題與控制 */
        .header {
            background: var(--dsat-red); padding: 2vh; font-size: 4vh;
            font-weight: 900; text-align: center; position: relative;
        }

        .controls {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; gap: 10px;
        }

        .btn {
            background: rgba(255,255,255,0.1); border: 1px solid #fff; color: #fff;
            padding: 8px 15px; cursor: pointer; border-radius: 4px;
        }

        /* 內容區：字體放大 4px 約等於增加 0.5vh 左右的比例 */
        .main-display { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            padding: 0 8vw; position: relative; 
        }

        #ui-content { 
            font-size: 5vh; /* 這裡已增加尺寸 */
            line-height: 1.7; color: #fff; text-align: justify; 
            transition: opacity 0.4s;
        }

        /* 右下角分頁數字 */
        .page-counter {
            position: absolute; bottom: 3vh; right: 4vw;
            font-size: 3vh; color: var(--page-info);
            font-family: Arial, sans-serif;
        }

        /* 走字 */
        .marquee-wrapper {
            background: #111; height: 12vh; border-top: 4px solid var(--text-gold);
            display: flex; align-items: center; overflow: hidden; position: relative;
        }
        #marquee-text { white-space: nowrap; font-size: 5.5vh; font-weight: bold; color: var(--text-gold); position: absolute; }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn" style="font-size: 2rem; padding: 20px 40px;" onclick="initSystem()">開始廣播</button>
    </div>

    <div class="header">
        <span id="ui-title">載入中...</span>
        <div class="controls">
            <button class="btn" onclick="resumeApp()">播放</button>
            <button class="btn" onclick="pauseApp()">暫停</button>
            <button class="btn" onclick="stopApp()">停止</button>
        </div>
    </div>

    <div class="main-display">
        <div id="ui-content"></div>
        <div id="ui-page" class="page-counter"></div> </div>

    <div class="marquee-wrapper">
        <div id="marquee-text"></div>
    </div>

    <script>
        const news = {
            title: "五一交通安排協調部署",
            fullText: "為保障五一勞動節假期期間市民和旅客出行暢順，並平衡遊客與居民的出行需求，交通事務局按照恆常跨部門協作機制，聯同治安警察局、海關、市政署、巴士公司、跨境客運、綜合度假休閒企業及酒店等舉行協調會議。透過協調公共巴士及輕軌服務、完善口岸交通配套、強化實時訊息發佈、制訂應急預案等，以有效疏導假期人流。",
            highlights: "【重點】增開 3BX, 17T, 21AT, 26AT, 101XS 路線；輕軌延長服務至凌晨；舊城區實施臨時行人專用區。"
        };

        let isRunning = false;
        let marqueePos = window.innerWidth;
        const synth = window.speechSynthesis;

        function splitText(text, size = 85) {
            const arr = [];
            for (let i = 0; i < text.length; i += size) arr.push(text.substring(i, i + size));
            return arr;
        }

        const pages = splitText(news.fullText);

        function initSystem() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui-title').innerText = news.title;
            document.getElementById('marquee-text').innerText = news.highlights;
            startMarquee();
            playSequence();
        }

        async function playSequence() {
            isRunning = true;
            const contentEl = document.getElementById('ui-content');
            const pageEl = document.getElementById('ui-page');

            for (let i = 0; i < pages.length; i++) {
                if (!isRunning) break;
                
                // 更新分頁顯示
                pageEl.innerText = `${i + 1} / ${pages.length}`;
                contentEl.innerText = pages[i];
                
                await speak(pages[i]);
                await new Promise(r => setTimeout(r, 800));
            }
            if (isRunning) playSequence(); // 循環播放
        }

        function speak(text) {
            return new Promise((resolve) => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-HK';
                utter.rate = 0.9;
                utter.onend = resolve;
                synth.speak(utter);
            });
        }

        function pauseApp() { synth.pause(); isRunning = false; }
        function resumeApp() { synth.resume(); isRunning = true; }
        function stopApp() { synth.cancel(); isRunning = false; document.getElementById('ui-content').innerText = "已停止"; }

        function startMarquee() {
            const marquee = document.getElementById('marquee-text');
            function animate() {
                if (isRunning) {
                    marqueePos -= 2;
                    if (marqueePos < -marquee.offsetWidth) marqueePos = window.innerWidth;
                    marquee.style.transform = `translateX(${marqueePos}px)`;
                }
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
