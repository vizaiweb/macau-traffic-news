<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DSAT 交通廣播監控系統</title>
    <style>
        :root {
            --red: #e63946; --gold: #ffca28; --bg: #050505;
            --header-h: 12vh; --footer-h: 12vh;
        }
        
        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            height: 100vh; width: 100vw; 
            display: grid;
            grid-template-rows: var(--header-h) 1fr var(--footer-h);
            overflow: hidden; /* 禁止全身捲動，防止排版崩壞 */
        }

        /* 頂部：確保按鈕與標題垂直居中，不位移 */
        .header { 
            background: var(--red); 
            display: flex; align-items: center; justify-content: center; 
            position: relative; z-index: 100;
        }
        .date-display { position: absolute; left: 20px; font-size: 2.5vh; }
        
        #ui-title { 
            width: 55%; text-align: center; font-weight: 900; 
            line-height: 1.2; display: flex; align-items: center; justify-content: center;
            height: 100%; /* 撐滿 header */
        }

        .controls { position: absolute; right: 20px; display: flex; gap: 10px; }
        .btn { 
            background: rgba(0, 0, 0, 0.3); border: 1.5px solid white; color: white; 
            padding: 8px 18px; font-size: 2vh; font-weight: bold; cursor: pointer; border-radius: 6px; 
        }

        /* 中間：文字顯示區，增加溢出保護 */
        .main-content { 
            display: flex; justify-content: center; align-items: center; 
            padding: 2vh 8vw; position: relative; overflow: hidden; 
        }
        #ui-text { 
            font-size: 6.5vh; line-height: 1.5; text-align: justify; 
            width: 100%; transition: opacity 0.3s; font-weight: 500;
            max-height: 100%; /* 限制文字高度 */
            word-break: break-all;
        }
        .page-info { position: absolute; bottom: 20px; right: 30px; font-size: 3vh; color: rgba(255, 255, 255, 0.2); }

        /* 底部 */
        .footer { background: #111; border-top: 5px solid var(--gold); position: relative; overflow: hidden; display: flex; align-items: center; }
        #marquee { white-space: nowrap; font-size: 6vh; color: var(--gold); position: absolute; font-weight: bold; }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .start-btn { padding: 30px 70px; font-size: 4vh; background: var(--red); color: white; border: none; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay"><button class="start-btn" onclick="initSystem()">啟動廣播監控系統</button></div>

    <header class="header">
        <div id="ui-date" class="date-display">--/--/----</div>
        <div id="ui-title">載入中...</div>
        <div class="controls">
            <button class="btn" onclick="ctrlPlay()">播放</button>
            <button class="btn" onclick="ctrlPause()">暫停</button>
            <button class="btn" onclick="ctrlStop()">停止</button>
        </div>
    </header>

    <main class="main-content">
        <div id="ui-text">正在對接數據...</div>
        <div id="ui-page" class="page-info"></div>
    </main>

    <footer class="footer"><div id="marquee">檢查資訊中...</div></footer>

    <script>
        let pages = [];
        let curIdx = 0;
        let isPlaying = false;
        let marqueePos = window.innerWidth;
        const synth = window.speechSynthesis;
        let currentUtterance = null;

        async function initSystem() {
            document.getElementById('overlay').style.display = 'none';
            await loadData();
            animateMarquee();
            setInterval(loadData, 600000); 
        }

        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                const data = await response.json();
                
                // 1. 標題縮放處理
                const titleEl = document.getElementById('ui-title');
                titleEl.innerText = data.title;
                if (data.title.length > 28) titleEl.style.fontSize = "2.8vh";
                else if (data.title.length > 18) titleEl.style.fontSize = "3.5vh";
                else titleEl.style.fontSize = "4.5vh";

                document.getElementById('ui-date').innerText = data.date;
                document.getElementById('marquee').innerText = "【最新交通消息】" + data.title;

                // 2. 核心修正：分頁與標點合併邏輯
                // 將內容按標點切開，但保留標點在陣列中
                const raw = data.fullText.split(/([。；！？])/).filter(Boolean);
                pages = [];
                let buffer = "";

                for (let i = 0; i < raw.length; i++) {
                    let item = raw[i].trim();
                    if (!item) continue;

                    buffer += item;

                    // 判斷是否需要切分頁面：
                    // A. 當前 buffer 已經包含標點符號 (確保標點不落單)
                    // B. 或者 buffer 長度已經超過 60 個字
                    if (item.match(/[。；！？]/) || buffer.length > 60) {
                        // 檢查 buffer 是否真的有內容（不只是標點）
                        if (buffer.replace(/[。；！？]/g, '').length > 0) {
                            pages.push(buffer);
                            buffer = "";
                        }
                    }
                }
                // 處理剩下的殘留文字
                if (buffer.trim().replace(/[。；！？]/g, '').length > 0) {
                    pages.push(buffer.trim());
                }

                if (!isPlaying) { curIdx = 0; ctrlPlay(); }
            } catch (e) { console.error("數據加載失敗:", e); }
        }

        async function broadcast() {
            if (!isPlaying || curIdx >= pages.length) {
                if (curIdx >= pages.length && isPlaying) {
                    curIdx = 0; 
                    setTimeout(broadcast, 2000); 
                }
                return;
            }

            const textEl = document.getElementById('ui-text');
            textEl.style.opacity = 0;
            
            setTimeout(() => {
                textEl.innerText = pages[curIdx];
                document.getElementById('ui-page').innerText = `${curIdx + 1} / ${pages.length}`;
                textEl.style.opacity = 1;

                currentUtterance = new SpeechSynthesisUtterance(pages[curIdx]);
                currentUtterance.lang = 'zh-HK';
                currentUtterance.rate = 0.92;
                
                currentUtterance.onend = () => { if (isPlaying) { curIdx++; setTimeout(broadcast, 1000); } };
                currentUtterance.onerror = () => { if (isPlaying) { curIdx++; broadcast(); } };
                synth.speak(currentUtterance);
            }, 300);
        }

        function ctrlPlay() { if (!isPlaying) { isPlaying = true; if (synth.paused) synth.resume(); else broadcast(); } }
        function ctrlPause() { isPlaying = false; synth.pause(); }
        function ctrlStop() { isPlaying = false; curIdx = 0; synth.cancel(); document.getElementById('ui-text').innerText = "播報已停止。"; document.getElementById('ui-page').innerText = ""; }

        function animateMarquee() {
            const m = document.getElementById('marquee');
            marqueePos -= 2.2;
            if (marqueePos < -m.offsetWidth) marqueePos = window.innerWidth;
            m.style.transform = `translateX(${marqueePos}px)`;
            requestAnimationFrame(animateMarquee);
        }
    </script>
</body>
</html>
