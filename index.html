<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>DSAT 廣播系統</title>
    <style>
        :root {
            --bg-color: #050505;
            --dsat-red: #e63946;
            --text-gold: #ffca28;
            --page-info: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0; background: var(--bg-color); color: white;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 標題區：固定高度，絕不重疊 */
        .header {
            height: 12vh; background: var(--dsat-red);
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .publish-date {
            position: absolute; left: 30px; font-size: 2.8vh; font-weight: normal;
        }

        #ui-title {
            font-size: 4.2vh; font-weight: 900; max-width: 65%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .controls { position: absolute; right: 20px; display: flex; gap: 10px; }
        .btn { background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff; padding: 8px 15px; cursor: pointer; border-radius: 4px; }

        /* 內容區：自動伸縮 */
        .main-display { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            padding: 0 7vw; position: relative; overflow: hidden;
        }

        #ui-content { 
            font-size: 6.5vh; line-height: 1.6; color: #fff; text-align: justify; 
            width: 100%; transition: opacity 0.4s; font-weight: 500;
        }

        .page-counter { position: absolute; bottom: 3vh; right: 4vw; font-size: 3.5vh; color: var(--page-info); }

        /* 底部走字區 */
        .marquee-wrapper {
            height: 12vh; background: #111; border-top: 5px solid var(--text-gold);
            display: flex; align-items: center; overflow: hidden; position: relative;
        }
        #marquee-text { white-space: nowrap; font-size: 6vh; font-weight: bold; color: var(--text-gold); position: absolute; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn" style="font-size: 2.5rem; padding: 25px 60px;" onclick="initSystem()">啟動廣播系統</button>
    </div>

    <header class="header">
        <div id="ui-date" class="publish-date">--/--/----</div>
        <div id="ui-title">同步中...</div>
        <div class="controls">
            <button class="btn" onclick="resumeApp()">▶</button>
            <button class="btn" onclick="pauseApp()">⏸</button>
            <button class="btn" onclick="stopApp()">⏹</button>
        </div>
    </header>

    <main class="main-display">
        <div id="ui-content">載入中...</div>
        <div id="ui-page" class="page-counter"></div>
    </main>

    <footer class="marquee-wrapper">
        <div id="marquee-text">正在載入新聞...</div>
    </footer>

    <script>
        let isStopped = true;
        let currentIter = 0;
        let pages = [];
        let marqueePos = window.innerWidth;
        const synth = window.speechSynthesis;

        function smartSplit(text, maxLength = 65) {
            const result = [];
            let currentStr = "";
            const chunks = text.split(/([。；！？])/).filter(Boolean);
            for (let s of chunks) {
                if ((currentStr + s).length > maxLength && currentStr !== "") {
                    result.push(currentStr);
                    currentStr = "";
                }
                currentStr += s;
            }
            if (currentStr) result.push(currentStr);
            return result;
        }

        async function updateData() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                document.getElementById('ui-title').innerText = data.title;
                document.getElementById('ui-date').innerText = data.date;
                document.getElementById('marquee-text').innerText = "【最新交通消息】" + data.title;
                pages = smartSplit(data.fullText);
                if (!isStopped) startBroadcast();
            } catch (e) { console.error("Waiting for JSON..."); }
        }

        function initSystem() {
            document.getElementById('overlay').style.display = 'none';
            isStopped = false;
            updateData();
            startMarquee();
            setInterval(updateData, 600000);
        }

        async function startBroadcast() {
            currentIter++;
            const iterId = currentIter;
            for (let i = 0; i < pages.length; i++) {
                if (isStopped || iterId !== currentIter) break;
                document.getElementById('ui-page').innerText = `${i + 1} / ${pages.length}`;
                document.getElementById('ui-content').innerText = pages[i];
                await speak(pages[i]);
                await new Promise(r => setTimeout(r, 1200));
            }
            if (!isStopped && iterId === currentIter) startBroadcast();
        }

        function speak(text) {
            return new Promise((resolve) => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-HK';
                utter.rate = 0.9;
                utter.onend = resolve;
                synth.speak(utter);
            });
        }

        function stopApp() { isStopped = true; synth.cancel(); document.getElementById('ui-content').innerText = "系統已停機"; }
        function resumeApp() { if (isStopped) { isStopped = false; startBroadcast(); } else { synth.resume(); } }
        function pauseApp() { synth.pause(); }

        function startMarquee() {
            const marquee = document.getElementById('marquee-text');
            function animate() {
                if (!isStopped && !synth.paused) {
                    marqueePos -= 2;
                    if (marqueePos < -marquee.offsetWidth) marqueePos = window.innerWidth;
                    marquee.style.transform = `translateX(${marqueePos}px)`;
                }
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
